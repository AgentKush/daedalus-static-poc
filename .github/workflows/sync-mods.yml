name: Sync mods from modinfo.json sources

on:
  schedule:
    - cron: "0 * * * *"     # every hour
  workflow_dispatch:         # manual trigger from the Actions tab
  push:
    branches: [main]
    paths:
      - "data/modders.json"  # re-run when the source list changes

permissions:
  contents: write             # so we can push the updated mods.json back to main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Fetch all modinfo.json sources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # for the derive-compatibility git lookups
        run: node scripts/sync-modinfos.mjs
      - name: Commit changes if mods.json changed
        run: |
          if git diff --quiet public/data/mods.json; then
            echo "No mod changes."
            exit 0
          fi
          git config user.name "daedalus-sync[bot]"
          git config user.email "daedalus-sync@users.noreply.github.com"
          git add public/data/mods.json
          git commit -m "Sync mods from modinfo.json sources

          $(node -e "
            const m = JSON.parse(require('fs').readFileSync('public/data/mods.json', 'utf-8'));
            const authors = [...new Set(m.map(x => x.author))].sort();
            console.log(\`\${m.length} mods from \${authors.length} authors\`);
          ")"
          git push
