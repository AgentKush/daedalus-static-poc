name: Feature request
description: Suggest an idea for the static site
labels: ["enhancement", "needs triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: A clear description of the gap. Skip if it's purely additive.
      placeholder: "I'm always frustrated when..."
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: What you'd like to see happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why you'd skip them.
  - type: dropdown
    id: scope
    attributes:
      label: Where does this fit?
      multiple: true
      options:
        - Mods listing page
        - Mod detail page
        - Tools page
        - Info page
        - Mod Requests board
        - Home page
        - Sync / data pipeline
        - Comments / ratings
        - Other
